name: host tests

# Gates the host-runnable surface: C unit tests (detector + canonical payload),
# Go verifier unit tests, the detect->sign->verify end-to-end pipeline (incl.
# negative attacks), and the tamper breach action. The OP-TEE TA/PTA/host build
# runs on the Arm rig (see docs/RUNBOOK.md) and is not part of CI.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Install C toolchain + OpenSSL
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev openssl python3
      - name: Run all host tests
        run: make test

  # Continuous reproducibility: rebuild the host artifacts in two separate trees
  # and fail if they are not byte-identical, then publish the SHA-256 measurement
  # manifest so anyone can confirm a released build is exactly this source.
  reproducible-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Install C toolchain + OpenSSL
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev openssl python3
      - name: Reproducible-build check (byte-identical across two trees)
        run: bash tools/repro.sh | tee repro-manifest.txt
      - name: Publish the measurement manifest to the run summary
        if: always()
        run: |
          {
            echo '### open-opticon — reproducible host-build measurements'
            echo "commit: \`${GITHUB_SHA}\`"
            echo '```'
            cat repro-manifest.txt 2>/dev/null || echo '(build did not complete)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repro-manifest
          path: repro-manifest.txt

  # Permissionless on-chain verification: restore the Foundry deps (pinned) and
  # verify the committed REAL Groth16 receipt against the RISC Zero verifier on a
  # local EVM — no testnet, no funds, no Docker. Guards that the zk receipt stays
  # EVM-checkable. (The zk STARK proof itself is heavy and stays out of CI.)
  onchain-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Restore Foundry deps (pinned)
        working-directory: onchain
        run: |
          git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
          git clone --depth 1 --branch v3.0.1 --recurse-submodules \
            https://github.com/risc0/risc0-ethereum lib/risc0-ethereum
      - name: Verify the real zk receipt on a local EVM
        working-directory: onchain
        run: forge test -vv

  # Faithful-port guard: the Rust zk detector (oo-detector) must produce verdicts
  # byte-identical to the published C detector (he_detector.c) on the shared
  # fixtures. Builds both CLIs (gcc + plain stable Rust — no risc0) and diffs them.
  port-equivalence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install C toolchain + OpenSSL
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev openssl python3
      - name: C detector == Rust port (differential)
        run: bash test/run_port_diff.sh

  # Bounded fuzzing of the hand-rolled CBOR payload decoder — it sits on the
  # trust boundary, so a continuous (short) fuzz pass guards against panics /
  # accepted-malformed inputs beyond the committed seed corpus.
  fuzz-decoder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Fuzz DecodePayload (30s)
        run: cd src/verifier && GOPROXY=off go test -run x -fuzz FuzzDecodePayload -fuzztime 30s .
