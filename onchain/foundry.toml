[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# OpenZeppelin's pure-Solidity P256 (used by HonestEarQuorum) needs the IR
# pipeline + optimizer to avoid "stack too deep".
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
    "risc0/=lib/risc0-ethereum/contracts/src/",
    "forge-std/=lib/forge-std/src/",
    "openzeppelin/=lib/risc0-ethereum/lib/openzeppelin-contracts/",
]
fs_permissions = [{ access = "read", path = "./test" }]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
